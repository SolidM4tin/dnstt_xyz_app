name: Build Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter (dev channel)
        run: |
          git clone https://github.com/flutter/flutter.git -b dev flutter-sdk
          flutter-sdk\bin\flutter.bat --version

      - name: Enable Windows desktop
        run: flutter-sdk\bin\flutter.bat config --enable-windows-desktop

      - name: Get dependencies
        run: flutter-sdk\bin\flutter.bat pub get

      - name: Build Windows release
        run: |
          chmod +x ./scripts/build_windows.sh
          ./scripts/build_windows.sh release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/runner/Release
