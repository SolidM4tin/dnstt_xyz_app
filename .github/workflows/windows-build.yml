name: Build & Release Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1️⃣ کلون ریپو (همه تاریخچه و tagها)
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # fetch all history including tags

      # 2️⃣ کلون Flutter main branch (برای Dart ≥3.10.7)
      - name: Clone Flutter main branch
        run: git clone https://github.com/flutter/flutter.git -b main flutter-sdk

      # 3️⃣ فعال کردن Windows desktop
      - name: Enable Windows desktop
        run: flutter-sdk\bin\flutter.bat config --enable-windows-desktop

      # 4️⃣ نصب dependencies
      - name: Get dependencies
        run: flutter-sdk\bin\flutter.bat pub get

      # 5️⃣ بیلد Windows release
      - name: Build Windows release
        run: ./scripts/build_windows.sh release

      # 6️⃣ ساخت Release با tag واقعی
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v2.2.0          # ← دقیقا همان tag واقعی روی GitHub
          name: Windows Build v2.2.0
          body: "Windows release built automatically by GitHub Actions."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7️⃣ آپلود exe به Release
      - name: Upload Windows exe to Release
        uses: softprops/action-gh-release@v1
        with:
          files: windows/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
