name: build-windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore dnstt_xyz_app.csproj

      - name: Publish
        run: dotnet publish dnstt_xyz_app.csproj -c Release -r win-x64 --self-contained true

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: "**/publish/*"
