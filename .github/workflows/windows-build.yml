name: Build & Release Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1️⃣ کلون ریپو
      - uses: actions/checkout@v4

      # 2️⃣ کلون Flutter main branch
      - name: Clone Flutter main branch
        run: git clone https://github.com/flutter/flutter.git -b main flutter-sdk

      # 3️⃣ فعال کردن Windows desktop
      - name: Enable Windows desktop
        run: flutter-sdk\bin\flutter.bat config --enable-windows-desktop

      # 4️⃣ نصب dependencies
      - name: Get dependencies
        run: flutter-sdk\bin\flutter.bat pub get

      # 5️⃣ بیلد Windows release
      - name: Build Windows release
        run: ./scripts/build_windows.sh release

      # 6️⃣ ساخت یک tag واقعی روی GitHub
      - name: Create Git tag
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          $TAG_NAME = "windows-build-" + (Get-Date -Format "yyyyMMddHHmmss")
          git tag $TAG_NAME
          git push origin $TAG_NAME
          echo "TAG_NAME=$TAG_NAME" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append

      # 7️⃣ ساخت Release با tag واقعی
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Windows Build ${{ env.TAG_NAME }}
          body: "Windows release built automatically by GitHub Actions."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 8️⃣ آپلود exe به Release
      - name: Upload Windows exe to Release
        uses: softprops/action-gh-release@v1
        with:
          files: windows/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
